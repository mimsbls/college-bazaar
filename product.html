<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; }
        .slider { display: flex; overflow-x: auto; height: 350px; background: #f8f8f8; scroll-snap-type: x mandatory; }
        .slider img { width: 100%; object-fit: contain; flex-shrink: 0; scroll-snap-align: start; }
        .info { padding: 20px; }
        .price { font-size: 30px; color: #28a745; font-weight: bold; }
        .name { font-size: 24px; font-weight: bold; margin: 10px 0; color: #333; }
        .desc-box { background: #f0f7ff; padding: 15px; border-radius: 12px; border-left: 6px solid #0088cc; margin-top: 20px; }
        .desc-text { white-space: pre-wrap; color: #444; line-height: 1.6; font-size: 16px; }
        .back-btn { width: 100%; padding: 15px; background: #0088cc; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 30px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div id="imageSlider" class="slider"></div>
    <div class="info">
        <div class="price" id="pPrice">Loading...</div>
        <div class="name" id="pName"></div>
        <div class="desc-box">
            <div style="font-weight:bold; color:#0088cc; margin-bottom:5px;">Product Info & Contact:</div>
            <div class="desc-text" id="pDesc"></div>
        </div>
        <button class="back-btn" onclick="history.back()">← Back to Home</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfgI", authDomain: "college-bazaar-e68cd.firebaseapp.com", projectId: "college-bazaar-e68cd", storageBucket: "college-bazaar-e68cd.firebasestorage.app", messagingSenderId: "1795308257", appId: "1:1795308257:web:217ec241fe97febb2455a0" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const id = new URLSearchParams(window.location.search).get('id');
                getDoc(doc(db, "products", id)).then(snap => {
                    if(snap.exists()){
                        const p = snap.data();
                        document.getElementById('pName').innerText = p.name;
                        document.getElementById('pPrice').innerText = "₹" + p.price;
                        document.getElementById('pDesc').innerText = p.desc;
                        const slider = document.getElementById('imageSlider');
                        const imgs = p.images || [p.imageUrl];
                        imgs.forEach(url => { if(url) slider.innerHTML += `<img src="${url}">`; });
                    }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
