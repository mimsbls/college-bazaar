<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; }
        .slider { display: flex; overflow-x: auto; height: 320px; background: #f9f9f9; scroll-snap-type: x mandatory; }
        .slider img { width: 100%; object-fit: contain; flex-shrink: 0; scroll-snap-align: start; }
        .info { padding: 20px; }
        .price { font-size: 26px; color: #28a745; font-weight: bold; }
        .desc { white-space: pre-wrap; color: #444; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="slider" id="images"></div>
    <div class="info">
        <div class="price" id="price"></div>
        <h2 id="name" style="margin:5px 0;"></h2>
        <div class="desc" id="desc"></div>
        <button onclick="history.back()" style="width:100%; padding:15px; background:#0088cc; color:white; border:none; border-radius:8px; margin-top:30px; font-weight:bold;">← Back to Bazaar</button>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfgI", authDomain: "college-bazaar-e68cd.firebaseapp.com", projectId: "college-bazaar-e68cd", storageBucket: "college-bazaar-e68cd.firebasestorage.app", messagingSenderId: "1795308257", appId: "1:1795308257:web:217ec241fe97febb2455a0" };
        const db = getFirestore(initializeApp(firebaseConfig));
        const id = new URLSearchParams(window.location.search).get('id');
        const snap = await getDoc(doc(db, "products", id));
        if(snap.exists()){
            const p = snap.data();
            document.getElementById('name').innerText = p.name;
            document.getElementById('price').innerText = "₹" + p.price;
            document.getElementById('desc').innerText = p.desc;
            const imgs = p.images || [p.imageUrl];
            imgs.forEach(u => document.getElementById('images').innerHTML += `<img src="${u}">`);
        }
    </script>
</body>
</html>
