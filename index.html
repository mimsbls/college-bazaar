<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>College Bazaar 🎓</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f0f2f5; }
        #login-page { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; padding: 20px; }
        #main-page { display: none; }
        .card { background: white; border-radius: 15px; margin: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #eee; }
        .card-body { padding: 15px; }
        .price { color: #28a745; font-size: 22px; font-weight: bold; margin: 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .chat-btn { flex: 2; background: #0088cc; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; display: inline-block; }
        .edit-btn { flex: 1; background: #ffc107; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; display: inline-block; }
        header { background: #0088cc; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .sell-btn { position: fixed; bottom: 25px; right: 20px; background: #ff5722; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; }
        .login-btn { background:#4285F4; color:white; border:none; padding:15px 40px; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <div id="login-page">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">College Bazaar 🎓</h1>
        <p style="color: #666; margin-bottom: 30px;">Campus ka apna marketplace</p>
        <button id="loginBtn" class="login-btn">Sign in with Google</button>
    </div>

    <div id="main-page">
        <header>
            <span style="font-size: 20px; font-weight: bold;">College Bazaar</span>
            <button id="logoutBtn" style="background:rgba(255,255,255,0.2); border:1px solid white; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
        </header>
        <div id="feed" style="padding-bottom: 100px;"></div>
        <a href="sell.html" class="sell-btn">➕ SELL (₹5)</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfgI",
            authDomain: "college-bazaar-e68cd.firebaseapp.com",
            projectId: "college-bazaar-e68cd",
            storageBucket: "college-bazaar-e68cd.firebasestorage.app",
            messagingSenderId: "1795308257",
            appId: "1:1795308257:web:217ec241fe97febb2455a0",
            measurementId: "G-8YW1D9GXBV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Button Click Listeners (Isse 100% sign-in kaam karega)
        document.getElementById('loginBtn').onclick = () => {
            signInWithPopup(auth, provider).catch(err => alert("Error: " + err.message));
        };

        document.getElementById('logoutBtn').onclick = () => {
            signOut(auth).then(() => location.reload());
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-page').style.display = "none";
                document.getElementById('main-page').style.display = "block";
                loadProducts(user.email);
            } else {
                document.getElementById('login-page').style.display = "flex";
                document.getElementById('main-page').style.display = "none";
            }
        });

        function loadProducts(myEmail) {
            const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    const isOwner = p.sellerEmail === myEmail;
                    feed.innerHTML += `
                        <div class="card">
                            <img src="${p.imageUrl || 'https://via.placeholder.com/400'}" alt="product">
                            <div class="card-body">
                                <p class="price">₹${p.price}</p>
                                <h3 style="margin: 5px 0;">${p.name}</h3>
                                <p style="color:#666; font-size:14px; margin-bottom:15px;">${p.desc}</p>
                                <div class="btn-group">
                                    ${isOwner ? `<a href="edit.html?id=${doc.id}" class="edit-btn">📝 Edit</a>` : ''}
                                    <a href="chat.html?id=${doc.id}" class="chat-btn">💬 Live Chat</a>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
