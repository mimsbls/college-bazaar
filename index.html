<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Market 🎓</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Pehle sab chhupa rahega */
        #main-app { display: none; }
        #login-screen { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; text-align: center; background: #f4f7f6;
        }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .google-btn { 
            background: #4285F4; color: white; border: none; padding: 12px 24px; 
            border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>Welcome to Campus Market 🎓</h1>
            <p>Please login with your college email to continue</p>
            <button class="google-btn" onclick="login()">Sign in with Google</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h1>Campus Market 🎓</h1>
            <button onclick="logout()" style="float:right; background:none; color:white; border:1px solid white; padding:5px; margin:10px; border-radius:5px;">Logout</button>
        </header>

        <div id="product-feed" class="feed">
            <p style="text-align:center;">Loading products...</p>
        </div>

        <a href="sell.html" class="sell-btn">SELL ₹5</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Aapka Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfI",
            authDomain: "college-bazaar-e68cd.firebaseapp.com",
            projectId: "college-bazaar-e68cd",
            storageBucket: "college-bazaar-e68cd.firebasestorage.app",
            messagingSenderId: "1795308257",
            appId: "1:1795308257:web:9f2d5926063c2a592455a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth).then(() => window.location.reload());

        // Sabse important logic yahan hai
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Agar user login hai, toh feed dikhao aur login screen hatao
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('main-app').style.display = "block";
                loadFeed();
            } else {
                // Agar logout hai, toh sirf login screen dikhao
                document.getElementById('login-screen').style.display = "flex";
                document.getElementById('main-app').style.display = "none";
            }
        });

        function loadFeed() {
            const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('product-feed');
                feed.innerHTML = "";
                snapshot.forEach(doc => {
                    const p = doc.data();
                    feed.innerHTML += `
                        <div class="card">
                            <img src="${p.imageUrl || 'https://via.placeholder.com/300'}" class="p-img">
                            <div class="p-info">
                                <h3>${p.name}</h3>
                                <p class="price">₹${p.price}</p>
                                <button onclick="alert('Contact: ${p.desc}')">Details</button>
                                <button class="chat-btn" onclick="location.href='chat.html?id=${doc.id}'">Live Comments</button>
                            </div>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
