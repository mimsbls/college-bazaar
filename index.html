<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Market 🎓</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Pehle sab chhupa rahega jab tak login na ho */
        #main-app { display: none; }
        #login-screen { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; text-align: center; 
            background: #f4f7f6; font-family: sans-serif;
        }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .google-btn { 
            background: #4285F4; color: white; border: none; padding: 12px 24px; 
            border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px; font-weight: bold;
        }
        .google-btn:hover { background: #357abd; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>Welcome to Campus Market 🎓</h1>
            <p>Please login with your Google account to continue.</p>
            <button class="google-btn" id="btn-login">Sign in with Google</button>
        </div>
    </div>

    <div id="main-app">
        <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #0088cc; color: white;">
            <h2>Campus Market 🎓</h2>
            <button onclick="logout()" style="background: white; color: #0088cc; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">Logout</button>
        </header>

        <div id="product-feed" class="feed" style="padding: 20px;">
            <p style="text-align:center;">Loading products...</p>
        </div>

        <a href="sell.html" class="sell-btn" style="position: fixed; bottom: 20px; right: 20px; background: #ff5722; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">SELL ₹5</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Aapka Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfI",
            authDomain: "college-bazaar-e68cd.firebaseapp.com",
            projectId: "college-bazaar-e68cd",
            storageBucket: "college-bazaar-e68cd.firebasestorage.app",
            messagingSenderId: "1795308257",
            appId: "1:1795308257:web:9f2d5926063c2a592455a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Login Button Click Logic
        document.getElementById('btn-login').onclick = () => {
            signInWithPopup(auth, provider)
                .then((result) => { console.log("User Logged In"); })
                .catch((error) => { alert("Login Error: " + error.message); });
        };

        // Logout Function
        window.logout = () => {
            signOut(auth).then(() => { window.location.reload(); });
        };

        // Check Login State (Auth Guard)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('main-app').style.display = "block";
                loadFeed();
            } else {
                document.getElementById('login-screen').style.display = "flex";
                document.getElementById('main-app').style.display = "none";
            }
        });

        // Products Load Karne ka Function
        function loadFeed() {
            const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('product-feed');
                feed.innerHTML = "";
                if (snapshot.empty) {
                    feed.innerHTML = "<p style='text-align:center;'>Abhi koi products nahi hain. Pehle seller bano!</p>";
                    return;
                }
                snapshot.forEach(docSnap => {
                    const p = docSnap.data();
                    feed.innerHTML += `
                        <div class="card" style="border: 1px solid #ddd; border-radius: 10px; margin-bottom: 20px; padding: 10px; background: white;">
                            <img src="${p.imageUrl || 'https://via.placeholder.com/300'}" style="width:100%; border-radius: 10px;">
                            <h3>${p.name}</h3>
                            <p style="color: green; font-weight: bold;">₹${p.price}</p>
                            <button onclick="alert('Contact Seller: ${p.desc}')" style="background:#0088cc; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Details</button>
                            <button onclick="location.href='chat.html?id=${docSnap.id}'" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-left:10px;">Chat</button>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
