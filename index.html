<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Market 🎓</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #main-app { display: none; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: #f4f7f6; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .google-btn { background: #4285F4; color: white; border: none; padding: 12px 24px; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h1>Welcome to Campus Market 🎓</h1>
            <p>Please login to see and sell items.</p>
            <button class="google-btn" id="loginBtn">Sign in with Google</button>
        </div>
    </div>

    <div id="main-app">
        <header style="background:#0088cc; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <h2>Campus Market 🎓</h2>
            <button id="logoutBtn" style="background:white; color:#0088cc; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
        </header>
        <div id="product-feed" class="feed" style="padding:20px;"></div>
        <a href="sell.html" class="sell-btn" style="position:fixed; bottom:20px; right:20px; background:#ff5722; color:white; padding:15px 30px; border-radius:50px; text-decoration:none; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.3);">SELL ₹5</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfI",
            authDomain: "college-bazaar-e68cd.firebaseapp.com",
            projectId: "college-bazaar-e68cd",
            storageBucket: "college-bazaar-e68cd.firebasestorage.app",
            messagingSenderId: "1795308257",
            appId: "1:1795308257:web:9f2d5926063c2a592455a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider).catch(err => alert(err.message));
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('main-app').style.display = "block";
                loadFeed();
            } else {
                document.getElementById('login-screen').style.display = "flex";
                document.getElementById('main-app').style.display = "none";
            }
        });

        function loadFeed() {
            const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('product-feed');
                feed.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const p = docSnap.data();
                    feed.innerHTML += `<div class="card" style="border:1px solid #ddd; border-radius:10px; margin-bottom:15px; padding:15px; background:white;">
                        <img src="${p.imageUrl}" style="width:100%; border-radius:10px;">
                        <h3>${p.name}</h3>
                        <p style="color:green; font-weight:bold;">₹${p.price}</p>
                        <button onclick="alert('Seller Contact: ${p.desc}')" style="background:#0088cc; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Details</button>
                        <button onclick="location.href='chat.html
