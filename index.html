    <title>College Bazaar 🎓</title>
    <style>

        .detail-btn { flex: 1; background: #6c757d; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; font-size: 14px; }
        header { background: #0088cc; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }

            signOut(auth).then(() => location.reload());

                document.getElementById('login-page').style.display = "flex";

            }
        });
