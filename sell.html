<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Item</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .box { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #status { text-align: center; color: #0088cc; font-weight: bold; display: none; padding: 10px; background: #e3f2fd; border-radius: 8px; margin-bottom: 10px; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-post { background: #ff5722; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center; color:#ff5722;">Post Your Ad 🚀</h2>
        <div id="status">Listing your item... ⏳</div>
        <label>Product Name</label><input id="name" type="text">
        <label>Price (₹)</label><input id="price" type="number">
        <label>Image Link</label><input id="img" type="text">
        <label>Description</label><textarea id="desc" rows="5"></textarea>
        <button class="btn-post" id="postBtn">Post Now ✅</button>
        <p style="text-align:center; margin-top:15px;"><a href="index.html" style="color:#666; text-decoration:none;">Cancel</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfgI", authDomain: "college-bazaar-e68cd.firebaseapp.com", projectId: "college-bazaar-e68cd", storageBucket: "college-bazaar-e68cd.firebasestorage.app", messagingSenderId: "1795308257", appId: "1:1795308257:web:217ec241fe97febb2455a0" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let userEmail = "";

        onAuthStateChanged(auth, (user) => { if (user) userEmail = user.email; else location.href="index.html"; });

        document.getElementById('postBtn').onclick = async () => {
            const n = document.getElementById('name').value;
            const p = document.getElementById('price').value;
            const i = document.getElementById('img').value;
            const d = document.getElementById('desc').value;

            if(!n || !p || !i) return alert("Fill all fields!");
            document.getElementById('status').style.display = "block";

            try {
                await addDoc(collection(db, "products"), { name:n, price:p, imageUrl:i, images:[i], desc:d, sellerEmail:userEmail, timestamp:serverTimestamp() });
                location.href = "index.html";
            } catch (e) { alert("Error!"); document.getElementById('status').style.display = "none"; }
        };
    </script>
</body>
</html>
