<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell - College Bazaar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <div id="sell-app" style="display:none; padding:20px; max-width:500px; margin:auto;">
        <h2>Sell Your Product 🎓</h2>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="number" id="pPrice" placeholder="Price (₹)">
        <textarea id="pDesc" placeholder="Contact Details"></textarea>
        <input type="text" id="pImgUrl" placeholder="Image Link">
        <button onclick="payNow()" style="background:#28a745; width:100%; color:white; padding:15px; margin-top:10px; border:none; border-radius:10px; font-weight:bold;">Pay ₹5 & Post</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfI",
            authDomain: "college-bazaar-e68cd.firebaseapp.com",
            projectId: "college-bazaar-e68cd",
            storageBucket: "college-bazaar-e68cd.firebasestorage.app",
            messagingSenderId: "1795308257",
            appId: "1:1795308257:web:9f2d5926063c2a592455a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) { document.getElementById('sell-app').style.display = "block"; }
            else { window.location.href = "index.html"; }
        });

        window.payNow = () => {
            const options = {
                "key": "rzp_test_SUbyWO4SEc3wka",
                "amount": "500",
                "currency": "INR",
                "name": "College Bazaar",
                "handler": async function (response) {
                    await addDoc(collection(db, "products"), {
                        name: document.getElementById('pName').value,
                        price: document.getElementById('pPrice').value,
                        desc: document.getElementById('pDesc').value,
                        imageUrl: document.getElementById('pImgUrl').value,
                        sellerId: auth.currentUser.uid,
                        timestamp: serverTimestamp()
                    });
                    alert("Success!"); window.location.href = "index.html";
                }
            };
            new Razorpay(options).open();
        };
    </script>
</body>
</html>
