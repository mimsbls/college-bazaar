<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell - College Bazaar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <header><h1>Post Your Product 🎓</h1></header>

    <div class="sell-container" style="padding:20px; max-width:500px; margin:auto;">
        <input type="text" id="pName" placeholder="Product Name (e.g. Cycle)">
        <input type="number" id="pPrice" placeholder="Price (₹)">
        <textarea id="pDesc" placeholder="Description & Contact Details"></textarea>
        <input type="text" id="pImgUrl" placeholder="Paste Image Link Here">
        
        <div class="payment-box" style="text-align:center; border:2px dashed #ff5722; padding:20px; border-radius:10px;">
            <p>Listing Fee: <b>₹5</b></p>
            <button id="rzp-button" onclick="startPayment()" style="background:#28a745; width:100%; color:white; padding:15px; border-radius:10px;">Pay ₹5 & Publish</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Yahan apna Firebase Config wala code paste karna
        const firebaseConfig = { 
            apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfI",
            authDomain: "college-bazaar-e68cd.firebaseapp.com",
            projectId: "college-bazaar-e68cd",
            storageBucket: "college-bazaar-e68cd.firebasestorage.app",
            messagingSenderId: "1795308257",
            appId: "1:1795308257:web:9f2d5926063c2a592455a0"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.startPayment = function() {
            const name = document.getElementById('pName').value;
            if(!name) { alert("Pehle details bharo!"); return; }

            var options = {
                "key": "rzp_test_SUbyWO4SEc3wka", // <--- AAPKI KEY DAAL DI HAI
                "amount": "500", // ₹5 in paise
                "currency": "INR",
                "name": "College Bazaar",
                "handler": function (response){
                    // Agar payment success hui toh ye function chalega
                    saveToFirebase();
                },
                "theme": {"color": "#0088cc"}
            };
            var rzp1 = new Razorpay(options);
            rzp1.open();
        }

        async function saveToFirebase() {
            try {
                await addDoc(collection(db, "products"), {
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    desc: document.getElementById('pDesc').value,
                    imageUrl: document.getElementById('pImgUrl').value,
                    sellerId: auth.currentUser ? auth.currentUser.uid : "Anonymous",
                    timestamp: serverTimestamp()
                });
                alert("Payment Success! Product is now Live.");
                window.location.href = "index.html";
            } catch (e) { alert("Error saving product!"); }
        }
    </script>
</body>
</html>
