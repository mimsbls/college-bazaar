<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Ad</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { color: #d9534f; font-weight: bold; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Post Product (₹5 Fee)</h2>
        <p id="status">Uploading Photos... Please wait ⏳</p>
        <input id="n" placeholder="Product Name">
        <input id="p" type="number" placeholder="Price (₹)">
        <textarea id="d" placeholder="Description & Phone"></textarea>
        <label>Select Photos (Max 3):</label>
        <input type="file" id="f" accept="image/*" multiple>
        <button class="btn" id="postBtn">Pay ₹5 & Post</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfgI", authDomain: "college-bazaar-e68cd.firebaseapp.com", projectId: "college-bazaar-e68cd", storageBucket: "college-bazaar-e68cd.firebasestorage.app", messagingSenderId: "1795308257", appId: "1:1795308257:web:217ec241fe97febb2455a0" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('postBtn').onclick = async () => {
            const files = document.getElementById('f').files;
            if(files.length === 0 || files.length > 3) return alert("Select 1 to 3 photos.");

            document.getElementById('status').style.display = "block";
            try {
                let urls = [];
                for(let file of files) {
                    const fd = new FormData(); fd.append("image", file);
                    const res = await fetch("https://api.imgbb.com/1/upload?key=16a0ea2b07218caafa04e2ac8dffbe1c", {method:"POST", body:fd});
                    const j = await res.json(); urls.push(j.data.url);
                }

                new Razorpay({
                    "key": "rzp_test_SUbyWO4SEc3wka", "amount": "500", "handler": async function() {
                        await addDoc(collection(db, "products"), {
                            name: document.getElementById('n').value,
                            price: document.getElementById('p').value,
                            desc: document.getElementById('d').value,
                            images: urls, sellerEmail: auth.currentUser.email, timestamp: serverTimestamp()
                        });
                        location.href="index.html";
                    }
                }).open();
            } catch(e) { alert("Error!"); }
        };
    </script>
</body>
</html>
