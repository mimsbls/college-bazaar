<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell - College Bazaar</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .box { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0088cc; font-size: 24px; }
        input, textarea { width: 100%; padding: 15px; margin: 12px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { background: #28a745; color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .cancel { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 16px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>List New Item 🎓</h2>
        <p style="text-align:center; color:#888;">Listing Fee: ₹5 only</p>
        
        <input id="n" placeholder="Product Name (e.g. Book)">
        <input id="p" type="number" placeholder="Price (₹)">
        <textarea id="d" rows="4" placeholder="Description & Contact Number"></textarea>
        <input id="i" placeholder="Image Link (URL)">
        
        <button class="btn" onclick="pay()">Pay ₹5 & Post Ad</button>
        <a href="index.html" class="cancel">← Back to Home</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Same Config as before
        const firebaseConfig = {
            apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfgI",
            authDomain: "college-bazaar-e68cd.firebaseapp.com",
            projectId: "college-bazaar-e68cd",
            storageBucket: "college-bazaar-e68cd.firebasestorage.app",
            messagingSenderId: "1795308257",
            appId: "1:1795308257:web:217ec241fe97febb2455a0",
            measurementId: "G-8YW1D9GXBV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.pay = () => {
            const name = document.getElementById('n').value;
            if(!name) return alert("Please enter name");

            var options = {
                "key": "rzp_test_SUbyWO4SEc3wka",
                "amount": "500",
                "name": "College Bazaar",
                "handler": async function (response) {
                    await addDoc(collection(db, "products"), {
                        name: name,
                        price: document.getElementById('p').value,
                        desc: document.getElementById('d').value,
                        imageUrl: document.getElementById('i').value,
                        timestamp: serverTimestamp()
                    });
                    alert("Item Published!"); window.location.href="index.html";
                }
            };
            new Razorpay(options).open();
        }
    </script>
</body>
</html>
