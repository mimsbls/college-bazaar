<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ad</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Edit Product</h2>
        <input id="n">
        <input id="p" type="number">
        <textarea id="d" rows="4"></textarea>
        <label>Change Photo (Optional):</label>
        <input type="file" id="f" accept="image/*">
        <button class="btn-save" id="sBtn">Save Changes</button>
        <button onclick="history.back()" style="width:100%; margin-top:10px; background:none; border:none; color:#666;">Cancel</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfgI", authDomain: "college-bazaar-e68cd.firebaseapp.com", projectId: "college-bazaar-e68cd", storageBucket: "college-bazaar-e68cd.firebasestorage.app", messagingSenderId: "1795308257", appId: "1:1795308257:web:217ec241fe97febb2455a0" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const id = new URLSearchParams(window.location.search).get('id');
        const ref = doc(db, "products", id);
        const snap = await getDoc(ref);
        if(snap.exists()){
            const data = snap.data();
            document.getElementById('n').value = data.name;
            document.getElementById('p').value = data.price;
            document.getElementById('d').value = data.desc;
        }

        document.getElementById('sBtn').onclick = async () => {
            let update = { name: document.getElementById('n').value, price: document.getElementById('p').value, desc: document.getElementById('d').value };
            const file = document.getElementById('f').files[0];
            if(file) {
                const fd = new FormData(); fd.append("image", file);
                const res = await fetch("https://api.imgbb.com/1/upload?key=16a0ea2b07218caafa04e2ac8dffbe1c", {method:"POST", body:fd});
                const j = await res.json(); update.images = [j.data.url];
            }
            await updateDoc(ref, update);
            alert("Updated!"); location.href="index.html";
        };
    </script>
</body>
</html>
