<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ad</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .box { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-del { background: none; color: #dc3545; border: 1px solid #dc3545; width: 100%; padding: 10px; border-radius: 10px; margin-top: 15px; cursor: pointer; }
        #status { text-align: center; color: #ff5722; font-weight: bold; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center; color:#0088cc;">Edit Your Ad 📝</h2>
        <div id="status">Updating your ad... ⏳</div>
        
        <label>Product Name</label>
        <input id="n" type="text">
        
        <label>Price (₹)</label>
        <input id="p" type="number">
        
        <label>Description & Phone</label>
        <textarea id="d" rows="5"></textarea>
        
        <label>Update Photo (Optional):</label>
        <input type="file" id="f" accept="image/*">
        
        <button class="btn-save" id="saveBtn">Save Changes ✅</button>
        <button class="btn-del" id="delBtn">Delete Ad 🗑️</button>
        <p style="text-align:center;"><a href="index.html" style="color:#666; text-decoration:none; font-size:14px;">Cancel</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfgI", authDomain: "college-bazaar-e68cd.firebaseapp.com", projectId: "college-bazaar-e68cd", storageBucket: "college-bazaar-e68cd.firebasestorage.app", messagingSenderId: "1795308257", appId: "1:1795308257:web:217ec241fe97febb2455a0" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const id = new URLSearchParams(window.location.search).get('id');
        const docRef = doc(db, "products", id);

        // --- Purana Data Load Karo ---
        getDoc(docRef).then(snap => {
            if(snap.exists()){
                const data = snap.data();
                document.getElementById('n').value = data.name || "";
                document.getElementById('p').value = data.price || "";
                document.getElementById('d').value = data.desc || "";
            }
        });

        // --- Update Karo ---
        document.getElementById('saveBtn').onclick = async () => {
            document.getElementById('status').style.display = "block";
            document.getElementById('saveBtn').disabled = true;
            
            let updateData = {
                name: document.getElementById('n').value,
                price: document.getElementById('p').value,
                desc: document.getElementById('d').value
            };

            const file = document.getElementById('f').files[0];
            if(file){
                const fd = new FormData(); fd.append("image", file);
                const res = await fetch("https://api.imgbb.com/1/upload?key=16a0ea2b07218caafa04e2ac8dffbe1c", {method:"POST", body:fd});
                const j = await res.json();
                updateData.images = [j.data.url]; // Nayi image update
            }

            await updateDoc(docRef, updateData);
            alert("Success! Ad updated. ✅");
            location.href = "index.html";
        };

        // --- Delete Karo ---
        document.getElementById('delBtn').onclick = async () => {
            if(confirm("Pakka delete karna hai?")){
                await deleteDoc(docRef);
                location.href = "index.html";
            }
        };
    </script>
</body>
</html>
