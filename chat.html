<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #eee; display: flex; flex-direction: column; height: 100vh; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; max-width: 80%; }
        .owner-msg { background: #e3f2fd; border-left: 5px solid #0088cc; }
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <header style="background:#0088cc; color:white; padding:15px;"><a href="index.html" style="color:white; text-decoration:none;">← Back</a> | Live Chat</header>
    <div id="chat-box"></div>
    <div class="input-area">
        <input id="m" placeholder="Type a message...">
        <button onclick="send()">Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyC9B6PGzPS7fInBCDGqtdhlViLQ5HGgfgI", authDomain: "college-bazaar-e68cd.firebaseapp.com", projectId: "college-bazaar-e68cd", storageBucket: "college-bazaar-e68cd.firebasestorage.app", messagingSenderId: "1795308257", appId: "1:1795308257:web:217ec241fe97febb2455a0" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let ownerEmail = "";

        // Get Owner Email
        getDoc(doc(db, "products", productId)).then(d => { ownerEmail = d.data().sellerEmail; });

        // Load Messages
        const q = query(collection(db, "products", productId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isOwner = m.userEmail === ownerEmail;
                box.innerHTML += `
                    <div class="msg ${isOwner ? 'owner-msg' : ''}">
                        <small style="color:#0088cc;">${isOwner ? '[Owner] ' : ''}${m.userName}</small><br>
                        ${m.text}
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        window.send = async () => {
            const txt = document.getElementById('m').value;
            if(!txt) return;
            await addDoc(collection(db, "products", productId, "messages"), {
                text: txt,
                userEmail: auth.currentUser.email,
                userName: auth.currentUser.displayName,
                timestamp: serverTimestamp()
            });
            document.getElementById('m').value = "";
        };
    </script>
</body>
</html>
